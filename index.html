<style>@import "https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap";:root{--bg:#07080d;--surface:#0d0f16;--surface-2:#12151f;--border:#ffffff12;--text:#ffffffe6;--text-sub:#ffffff80;--accent:#7c6fcd;--accent-2:#3b82f6;--green:#10b981;--red:#ef4444;--yellow:#f59e0b}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);min-height:100vh;font-family:Inter,sans-serif}.nav{z-index:100;-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);background:#07080dd9;align-items:center;gap:2rem;height:60px;padding:0 2rem;display:flex;position:sticky;top:0}.nav-brand{flex-shrink:0;align-items:center;gap:.5rem;display:flex}.nav-logo{font-size:1.4rem}.nav-title{letter-spacing:-.01em;font-size:1rem;font-weight:700}.nav-badge{color:var(--accent);background:#7c6fcd26;border:1px solid #7c6fcd40;border-radius:20px;padding:2px 8px;font-size:.7rem;font-weight:500}.nav-tabs{gap:.25rem;display:flex;overflow-x:auto}.nav-tab{color:var(--text-sub);cursor:pointer;white-space:nowrap;background:0 0;border:none;border-radius:6px;padding:.4rem .9rem;font-family:Inter,sans-serif;font-size:.85rem;font-weight:500;transition:all .15s}.nav-tab:hover{color:var(--text);background:#ffffff0d}.nav-tab.active{color:var(--accent);background:#7c6fcd1f}.main{max-width:1100px;min-height:calc(100vh - 100px);margin:0 auto;padding:2.5rem 1.5rem}.tab-content{animation:.2s fadeIn}@keyframes fadeIn{0%{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.section-header{margin-bottom:1.5rem}.section-header h2{letter-spacing:-.02em;font-size:1.6rem;font-weight:700}.section-sub{color:var(--text-sub);margin-top:.25rem;font-size:.9rem}.hero{text-align:center;padding:3rem 1rem}.hero-avatar{filter:drop-shadow(0 0 30px #7c6fcd66);margin-bottom:1rem;font-size:5rem}.hero-name{letter-spacing:-.04em;background:linear-gradient(135deg,#fff 0%,#7c6fcde6 100%);-webki
