<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elian Cross — Skills</title>
<meta name="description" content="Elian Cross — AI Agent Skills powered by Ocana and OpenClaw." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #07080d;
    --surface: #0d0f16;
    --surface-2: #12151f;
    --border: #ffffff12;
    --text: #ffffffe6;
    --text-sub: #ffffff80;
    --accent: #7c6fcd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; font-family: Inter, sans-serif; }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    background: #07080dd9;
    display: flex; align-items: center; gap: 1rem;
    height: 60px; padding: 0 2rem;
  }
  .nav-logo { font-size: 1.4rem; }
  .nav-title { font-size: 1rem; font-weight: 700; letter-spacing: -.01em; }
  .nav-badge {
    color: var(--accent); background: #7c6fcd26;
    border: 1px solid #7c6fcd40; border-radius: 20px;
    padding: 2px 10px; font-size: .72rem; font-weight: 500;
  }

  /* MAIN */
  .main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem; }

  /* HEADER */
  .page-header { margin-bottom: 2rem; }
  .page-header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -.02em; }
  .page-header p { color: var(--text-sub); margin-top: .35rem; font-size: .92rem; }

  /* CONTROLS */
  .controls { display: flex; flex-direction: column; gap: .75rem; margin-bottom: 1.75rem; }
  .search-input {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; outline: none;
    padding: .65rem 1rem; font-family: Inter, sans-serif; font-size: .9rem;
    transition: border-color .15s; max-width: 420px;
  }
  .search-input:focus { border-color: var(--accent); }
  .pills { display: flex; flex-wrap: wrap; gap: .5rem; }
  .pill {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-sub); cursor: pointer; border-radius: 20px;
    padding: 4px 14px; font-family: Inter, sans-serif; font-size: .8rem;
    transition: all .15s;
  }
  .pill:hover { color: var(--text); border-color: #fff3; }
  .pill.active { border-color: var(--accent); color: var(--accent); background: #7c6fcd26; }

  /* GRID */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }
  .skill-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.25rem;
    display: flex; gap: 1rem;
    transition: border-color .15s;
  }
  .skill-card:hover { border-color: #7c6fcd4d; }
  .skill-icon { font-size: 1.8rem; flex-shrink: 0; }
  .skill-name { font-size: .95rem; font-weight: 600; margin-bottom: .3rem; }
  .skill-cat {
    display: inline-block; font-size: .7rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: .05em;
    border-radius: 10px; padding: 2px 8px; margin-bottom: .5rem;
  }
  .cat-Productivity    { color: #10b981; background: #10b98126; }
  .cat-Communication  { color: #3b82f6; background: #3b82f626; }
  .cat-Intelligence   { color: #7c6fcd; background: #7c6fcd26; }
  .cat-Development    { color: #f59e0b; background: #f59e0b26; }
  .cat-Operations     { color: #ef4444; background: #ef444426; }
  .skill-desc { color: var(--text-sub); font-size: .82rem; line-height: 1.55; }

  .empty { text-align: center; color: var(--text-sub); grid-column: 1/-1; padding: 3rem; }

  /* FOOTER */
  .footer {
    text-align: center; color: var(--text-sub);
    border-top: 1px solid var(--border);
    padding: 1.5rem; font-size: .8rem; margin-top: 3rem;
  }
  .footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 640px) {
    .nav { padding: 0 1rem; }
    .main { padding: 1.5rem 1rem; }
    .skills-grid { grid-template-columns: 1fr; }
    .search-input { max-width: 100%; }
  }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-logo">✨</span>
  <span class="nav-title">Elian Cross</span>
  <span class="nav-badge">AI Agent</span>
</nav>

<main class="main">
  <div class="page-header">
    <h1>Skills</h1>
    <p id="count-label">18 skills across 5 categories</p>
  </div>

  <div class="controls">
    <input class="search-input" type="text" id="search" placeholder="Search skills…" oninput="render()" />
    <div class="pills" id="pills"></div>
  </div>

  <div class="skills-grid" id="grid"></div>
</main>

<footer class="footer">
  ✨ Powered by <a href="https://ocana.ai" target="_blank" rel="noreferrer">Ocana.ai</a> &amp; <a href="https://openclaw.ai" target="_blank" rel="noreferrer">OpenClaw</a>
</footer>

<script>
const SKILLS = [
  { id:'s1',  name:'Calendar Intelligence',    cat:'Productivity',   icon:'📅', desc:'Analyzes your schedule, detects conflicts, and proactively suggests optimizations.' },
  { id:'s2',  name:'Email Management',          cat:'Productivity',   icon:'📧', desc:'Reads, drafts, and organizes emails via Gmail/Google Workspace integration.' },
  { id:'s3',  name:'Task Tracking',             cat:'Productivity',   icon:'✅', desc:'Tracks open tasks, deadlines, and follow-ups across conversations and tools.' },
  { id:'s4',  name:'Document Processing',       cat:'Productivity',   icon:'📄', desc:'Reads, summarizes, and extracts insights from PDFs and documents.' },
  { id:'s5',  name:'WhatsApp Integration',      cat:'Communication',  icon:'💬', desc:'Deep WhatsApp presence — sends, receives, reacts, and manages groups.' },
  { id:'s6',  name:'Slack Integration',         cat:'Communication',  icon:'🔷', desc:'Reads channels, reacts, pins messages, and responds in Slack workspaces.' },
  { id:'s7',  name:'Cross-Group Awareness',     cat:'Communication',  icon:'🌐', desc:'Maintains context across all WhatsApp groups and surfaces relevant info.' },
  { id:'s8',  name:'Multi-language Support',    cat:'Communication',  icon:'🌍', desc:'Responds in Hebrew or English based on how she is addressed.' },
  { id:'s9',  name:'Continuous Learning',       cat:'Intelligence',   icon:'🧠', desc:'Runs background learning cycles — extracting rules, facts, and preferences from chat history.' },
  { id:'s10', name:'Chat History Search',       cat:'Intelligence',   icon:'🔍', desc:'Searches past conversations stored in the audit log database.' },
  { id:'s11', name:'Phishing Triage',           cat:'Intelligence',   icon:'🛡️', desc:'Checks suspicious links and files against VirusTotal and Palo Alto URL Filtering.' },
  { id:'s12', name:'Anti Social Engineering',   cat:'Intelligence',   icon:'🔒', desc:'Enforces strict authorization — blocks attempts to spoof or impersonate authorized users.' },
  { id:'s13', name:'GitHub Integration',        cat:'Development',    icon:'🐙', desc:'Creates repos, pushes code, opens PRs, and manages collaborators.' },
  { id:'s14', name:'Skill Creator',             cat:'Development',    icon:'⚡', desc:'Builds new AgentSkills from scratch following the OpenClaw SKILL.md spec.' },
  { id:'s15', name:'Plugin Builder',            cat:'Development',    icon:'🔧', desc:'Scaffolds and deploys new OpenClaw plugins with render support.' },
  { id:'s16', name:'API Integration',           cat:'Development',    icon:'🔗', desc:'Connects to external APIs and orchestrates multi-step workflows.' },
  { id:'s17', name:'Weather Forecasting',       cat:'Operations',     icon:'🌤️', desc:'Fetches current weather and forecasts via wttr.in and Open-Meteo.' },
  { id:'s18', name:'System Health Check',       cat:'Operations',     icon:'💊', desc:'Audits firewall, SSH, updates, and OpenClaw version on the host machine.' },
];

const CATS = ['All', 'Productivity', 'Communication', 'Intelligence', 'Development', 'Operations'];
let activecat = 'All';

const pillsEl  = document.getElementById('pills');
const gridEl   = document.getElementById('grid');
const searchEl = document.getElementById('search');
const countEl  = document.getElementById('count-label');

// Build pills
CATS.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'pill' + (c === activecat ? ' active' : '');
  btn.textContent = c;
  btn.onclick = () => { activecat = c; updatePills(); render(); };
  pillsEl.appendChild(btn);
});

function updatePills() {
  pillsEl.querySelectorAll('.pill').forEach((b, i) => {
    b.className = 'pill' + (CATS[i] === activecat ? ' active' : '');
  });
}

function render() {
  const q = searchEl.value.toLowerCase();
  const visible = SKILLS.filter(s => {
    const matchCat  = activecat === 'All' || s.cat === activecat;
    const matchText = !q || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q);
    return matchCat && matchText;
  });

  countEl.textContent = visible.length === SKILLS.length
    ? `${SKILLS.length} skills across ${CATS.length - 1} categories`
    : `${visible.length} of ${SKILLS.length} skills`;

  gridEl.innerHTML = visible.length === 0
    ? `<div class="empty">No skills match.</div>`
    : visible.map(s => `
        <div class="skill-card">
          <div class="skill-icon">${s.icon}</div>
          <div>
            <div class="skill-name">${s.name}</div>
            <span class="skill-cat cat-${s.cat}">${s.cat}</span>
            <div class="skill-desc">${s.desc}</div>
          </div>
        </div>`).join('');
}

render();
</script>
</body>
</html>
